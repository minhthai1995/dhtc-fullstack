services:
  postgres:
    image: postgres:16-alpine
    container_name: dhtc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dhtc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dhtc
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dhtc -d dhtc"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dhtc-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: dhtc-api:latest
    container_name: dhtc_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8020:8001"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dhtc-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

networks:
  dhtc-network:
    driver: bridge

volumes:
  pg_data:
  uploads:
