name: deploy-frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-1
  S3_BUCKET: app-dhtcdanang-com
  CLOUDFRONT_DOMAIN: app.dhtcdanang.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://api.dhtcdanang.com
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve CloudFront distribution id
        id: cf
        run: |
          ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, '${CLOUDFRONT_DOMAIN}')].Id | [0]" \
            --output text)
          if [ -z "$ID" ] || [ "$ID" = "None" ]; then
            echo "No distribution found for ${CLOUDFRONT_DOMAIN}"
            exit 1
          fi
          echo "id=${ID}" >> "$GITHUB_OUTPUT"

      - name: Sync hashed assets (long cache)
        run: |
          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" --exclude "*.html"

      - name: Sync HTML (short cache)
        run: |
          aws s3 sync frontend/dist/ "s3://${S3_BUCKET}/" \
            --cache-control "public, max-age=60, must-revalidate" \
            --exclude "*" --include "*.html"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cf.outputs.id }}" \
            --paths "/*" > /dev/null
