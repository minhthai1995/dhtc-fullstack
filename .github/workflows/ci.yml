name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy app
        continue-on-error: true

      - name: Test
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload frontend dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 103.161.97.176 >> ~/.ssh/known_hosts

      - name: Sync backend code
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/ root@103.161.97.176:/opt/dhtc/backend/

      - name: Sync frontend dist
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "mkdir -p /opt/dhtc/frontend/dist"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ root@103.161.97.176:/opt/dhtc/frontend/dist/

      - name: Sync deploy scripts
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            scripts/ root@103.161.97.176:/opt/dhtc/scripts/
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "chmod +x /opt/dhtc/scripts/*.sh"

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "bash /opt/dhtc/scripts/deploy.sh"

      - name: Reload nginx for frontend
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "docker exec stock-nginx nginx -t && docker exec stock-nginx nginx -s reload"
