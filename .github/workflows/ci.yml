name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  diagnose-nginx:
    name: Diagnose nginx (manual only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 103.161.97.176 >> ~/.ssh/known_hosts

      - name: Verify subdomain health
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 << 'EOF'
            echo "=== Host inode ==="
            stat -c '%i %n' /opt/stock-dashboard/nginx/nginx.conf

            echo "=== Container inode ==="
            docker exec stock-nginx stat -c '%i %n' /etc/nginx/conf.d/default.conf

            echo "=== Link count (0=stale, >0=live) ==="
            docker exec stock-nginx stat -c '%h links' /etc/nginx/conf.d/default.conf

            echo "=== @spa_fallback in container config? ==="
            docker exec stock-nginx grep -c "@spa_fallback" /etc/nginx/conf.d/default.conf && echo "YES — redirect cycle fixed" || echo "NO — still has old config"

            echo ""
            echo "=== Curl subdomains ==="
            for d in admin seller marketplace; do
              code=$(curl -sk -o /dev/null -w "%{http_code}" https://${d}.dhtcdanang.com/)
              echo "  ${d}.dhtcdanang.com: ${code}"
            done

            echo ""
            echo "=== nginx error log (last 60s) ==="
            docker logs stock-nginx --since 60s 2>&1 | grep -i "error\|500\|cycle" | tail -5 || echo "(no errors)"
          EOF


  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy app
        continue-on-error: true

      - name: Test
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload frontend dist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to VPS
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 103.161.97.176 >> ~/.ssh/known_hosts
          printf 'Host 103.161.97.176\n  IdentityFile ~/.ssh/deploy_key\n  StrictHostKeyChecking no\n' >> ~/.ssh/config

      - name: Sync backend code
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            backend/ root@103.161.97.176:/opt/dhtc/backend/

      - name: Sync frontend dist
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "mkdir -p /opt/dhtc/frontend/dist"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            frontend/dist/ root@103.161.97.176:/opt/dhtc/frontend/dist/

      - name: Sync deploy scripts
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key" \
            scripts/ root@103.161.97.176:/opt/dhtc/scripts/
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "chmod +x /opt/dhtc/scripts/*.sh"

      - name: Deploy backend
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "bash /opt/dhtc/scripts/deploy.sh"

      - name: Remove stale DHTC-FE HTTPS blocks from nginx (in-place write)
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "python3 /opt/dhtc/scripts/remove-dhtc-https-blocks.py && \
             echo 'Host inode:' && stat -c '%i %n' /opt/stock-dashboard/nginx/nginx.conf && \
             echo 'Container inode:' && docker exec stock-nginx stat -c '%i %n' /etc/nginx/conf.d/default.conf"

      - name: Setup frontend subdomains (idempotent)
        run: bash scripts/setup-subdomains.sh root@103.161.97.176

      - name: Copy frontend files to certbot www (mounted volume)
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "mkdir -p /opt/stock-dashboard/certbot/www/dhtc && \
             cp -r /opt/dhtc/frontend/dist/. /opt/stock-dashboard/certbot/www/dhtc/ && \
             echo 'Frontend files in /opt/stock-dashboard/certbot/www/dhtc → /var/www/certbot/dhtc in container'"

      - name: Restart stock-nginx to resync bind-mount inode
        run: |
          ssh -i ~/.ssh/deploy_key root@103.161.97.176 \
            "docker restart stock-nginx && \
             echo 'stock-nginx restarted — bind-mount now reads host inode (correct config)' && \
             docker exec stock-nginx nginx -t && \
             echo 'nginx config valid'"
